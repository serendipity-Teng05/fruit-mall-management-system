services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - production.env
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - backend-logs:/app/logs
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - app

networks:
  app:

volumes:
  backend-logs:

