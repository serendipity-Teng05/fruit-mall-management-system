name: fruit-mall-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest-root-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Initialize and migrate MySQL
        env:
          MYSQL_PWD: test-root-password
        run: |
          mysql -h 127.0.0.1 -uroot < database/fruit_mall.sql
          mysql -h 127.0.0.1 -uroot fruit_mall < database/upgrade_v5_hardening.sql
          mysql -h 127.0.0.1 -uroot fruit_mall < database/upgrade_v6_production_readiness.sql
          mysql -h 127.0.0.1 -uroot fruit_mall < database/upgrade_v7_audit_reliability.sql

      - name: Backend tests and package
        env:
          RUN_DB_INTEGRATION_TESTS: 'true'
          TEST_DB_USERNAME: root
          TEST_DB_PASSWORD: test-root-password
        run: ./mvnw -B verify

      - name: Frontend install and checks
        working-directory: frontend
        run: |
          npm ci
          npm run check

      - uses: actions/upload-artifact@v4
        with:
          name: fruit-mall-build
          path: |
            target/*.jar
            frontend/dist
