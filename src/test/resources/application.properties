app.order.scheduler-enabled=false
spring.datasource.url=${TEST_DB_URL:jdbc:mysql://127.0.0.1:3306/fruit_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false}
spring.datasource.username=${TEST_DB_USERNAME:root}
spring.datasource.password=${TEST_DB_PASSWORD:}
app.jwt.secret=FruitMall-Test-Only-JWT-Secret-Do-Not-Use-In-Production-2026-Integration
app.jwt.expire-millis=1800000
app.jwt.refresh-days=7
app.jwt.refresh-cookie-name=fruit_mall_refresh
app.jwt.refresh-cookie-secure=false
app.cors.allowed-origins=http://127.0.0.1:5173,http://localhost:5173
app.payment.demo-enabled=true
app.security.distributed-state-enabled=false
app.security.trust-forwarded-headers=false
app.security.login.max-failures=5
