spring.config.import=optional:file:./config/application-local.properties

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/fruit_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

app.jwt.secret=${JWT_SECRET:FruitMall-Local-Development-Secret-Change-Before-Production-2026}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
app.payment.demo-enabled=${PAYMENT_DEMO_ENABLED:true}
app.security.distributed-state-enabled=${DISTRIBUTED_STATE_ENABLED:false}
app.security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}

spring.session.store-type=none
management.server.port=${MANAGEMENT_PORT:8080}
