spring.application.name=fruit-mall
spring.profiles.default=dev

server.port=${SERVER_PORT:8080}
server.shutdown=graceful
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript,image/svg+xml
server.servlet.session.timeout=15m
spring.lifecycle.timeout-per-shutdown-phase=20s

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MILLIS:10000}
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.max-lifetime=1700000

app.jwt.expire-millis=${JWT_EXPIRE_MILLIS:1800000}
app.jwt.refresh-days=${JWT_REFRESH_DAYS:7}
app.jwt.refresh-cookie-name=fruit_mall_refresh
app.jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE:false}
app.payment.demo-enabled=${PAYMENT_DEMO_ENABLED:false}
app.order.payment-timeout-minutes=${ORDER_PAYMENT_TIMEOUT_MINUTES:30}
app.order.timeout-scan-millis=${ORDER_TIMEOUT_SCAN_MILLIS:60000}
app.order.timeout-initial-delay-millis=${ORDER_TIMEOUT_INITIAL_DELAY_MILLIS:30000}
app.order.scheduler-enabled=${ORDER_SCHEDULER_ENABLED:true}

app.security.distributed-state-enabled=${DISTRIBUTED_STATE_ENABLED:false}
app.security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}
app.security.login.max-failures=${LOGIN_MAX_FAILURES:5}
app.security.login.lock-minutes=${LOGIN_LOCK_MINUTES:15}
app.security.request-id-header=X-Request-Id

mybatis-plus.configuration.log-impl=${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
mybatis-plus.type-aliases-package=com.example.fruitmallmanagementsystem.entity

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

spring.jackson.default-property-inclusion=non_null
