# 生产配置全部由环境变量注入；缺失值会令应用拒绝启动。
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

app.jwt.secret=${JWT_SECRET}
app.jwt.refresh-cookie-secure=true
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.payment.demo-enabled=${PAYMENT_DEMO_ENABLED:false}
app.security.distributed-state-enabled=${DISTRIBUTED_STATE_ENABLED:true}
app.security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:true}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s
spring.session.store-type=redis
spring.session.redis.namespace=fruit-mall:session

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# 管理端口默认只监听本机，由监控代理抓取，不对公网开放。
management.server.port=${MANAGEMENT_PORT:9090}
management.server.address=${MANAGEMENT_ADDRESS:127.0.0.1}
management.endpoint.health.show-details=when_authorized

logging.file.name=${LOG_FILE:logs/fruit-mall.log}
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=30
