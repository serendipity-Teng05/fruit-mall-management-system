<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 考研上岸 | 一研为定</title>
    <style>
        /* 1. 基础设置 - 移除外部字体，使用系统自带字体 */
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 兼容中英文的衬线体，营造书卷气 */
            font-family: "Songti SC", "SimSun", "Times New Roman", serif;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景球 - 纯CSS动画 */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.8;
            animation: float 8s infinite ease-in-out;
        }
        .blob-1 { width: 300px; height: 300px; background: #ff9a9e; top: -50px; left: -50px; }
        .blob-2 { width: 350px; height: 350px; background: #a18cd1; bottom: -50px; right: -50px; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 40px); }
        }

        /* 主卡片容器 - 玻璃拟态效果 */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 90%;
            max-width: 800px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            padding: 40px;
            text-align: center;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            background: linear-gradient(to right, #333, #666);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 4px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 倒计时样式 */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 100px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .num {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
            color: #2980b9;
            font-family: Arial, sans-serif; /* 数字用无衬线体更清晰 */
        }

        .label {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        /* 语录区域 */
        .quote-box {
            background: rgba(255,255,255,0.4);
            padding: 20px;
            border-left: 4px solid #2980b9;
            text-align: left;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        .quote-content { font-size: 1.1rem; font-style: italic; color: var(--text-main); line-height: 1.6; }
        .quote-author { text-align: right; font-size: 0.9rem; color: var(--text-sub); margin-top: 8px; }

        /* 进度列表 */
        .grid-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .item {
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            transition: transform 0.3s;
        }
        .item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.8); }

        .item-title { font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .emoji { font-size: 1.2rem; }

        .progress-bg {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #89f7fe 0%, #66a6ff 100%);
            width: 0%;
            transition: width 1.5s ease-out;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .time-box { min-width: 70px; padding: 10px; }
            .num { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<!-- 背景装饰 -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
    <h1>2026 考研上岸</h1>
    <p class="subtitle">Study for Master | 乾坤未定，你我皆是黑马</p>

    <!-- 倒计时 -->
    <div class="countdown">
        <div class="time-box">
            <span class="num" id="d">0</span>
            <span class="label">天 Days</span>
        </div>
        <div class="time-box">
            <span class="num" id="h">0</span>
            <span class="label">时 Hours</span>
        </div>
        <div class="time-box">
            <span class="num" id="m">0</span>
            <span class="label">分 Mins</span>
        </div>
    </div>

    <!-- 语录 -->
    <div class="quote-box">
        <div class="quote-content" id="quote">"星光不问赶路人，时光不负有心人。"</div>
        <div class="quote-author">—— 致考研人</div>
    </div>

    <!-- 科目进度 (使用Emoji代替图标，防止不显示) -->
    <div class="grid-box">
        <div class="item">
            <div class="item-title"><span class="emoji">📐</span> 高等数学</div>
            <div class="progress-bg"><div class="progress-bar" style="width: 65%"></div></div>
            <div style="font-size:12px; color:#888; margin-top:4px;">基础阶段复习</div>
        </div>
        <div class="item">
            <div class="item-title"><span class="emoji">🔤</span> 考研英语</div>
            <div class="progress-bg"><div class="progress-bar" style="width: 40%"></div></div>
            <div style="font-size:12px; color:#888; margin-top:4px;">单词背诵 Day 32</div>
        </div>
        <div class="item">
            <div class="item-title"><span class="emoji">🚩</span> 思想政治</div>
            <div class="progress-bg"><div class="progress-bar" style="width: 5%"></div></div>
            <div style="font-size:12px; color:#888; margin-top:4px;">暂未开始</div>
        </div>
        <div class="item">
            <div class="item-title"><span class="emoji">💻</span> 专业课</div>
            <div class="progress-bg"><div class="progress-bar" style="width: 25%"></div></div>
            <div style="font-size:12px; color:#888; margin-top:4px;">阅读教材第一遍</div>
        </div>
    </div>

    <footer>
        2026 一研为定 · 顶峰相见 ❤️ Keep Running
    </footer>
</div>

<script>
    // 1. 倒计时逻辑 (兼容性极强的写法)
    // 设定目标日期：2025年12月20日 (预计2026考研初试时间)
    const targetDate = new Date("2025/12/20 08:30:00").getTime();

    function updateTime() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff > 0) {
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('d').innerText = days;
            document.getElementById('h').innerText = String(hours).padStart(2, '0');
            document.getElementById('m').innerText = String(minutes).padStart(2, '0');
        } else {
            document.querySelector('.countdown').innerHTML = "<h2 style='color:#2980b9'>考试已结束，静候佳音！</h2>";
        }
    }

    setInterval(updateTime, 1000);
    updateTime(); // 立即执行一次

    // 2. 进度条动画
    setTimeout(() => {
        const bars = document.querySelectorAll('.progress-bar');
        // 获取原本写在style里的width，重新赋值触发transition
        bars.forEach(bar => {
            const w = bar.style.width;
            bar.style.width = '0'; // 先归零
            setTimeout(() => bar.style.width = w, 100); // 再展开
        });
    }, 500);

    // 3. 随机语录
    const quotes = [
        "关关难过关关过，前路漫漫亦灿灿。",
        "种一棵树最好的时间是十年前，其次是现在。",
        "看似不起眼的日复一日，会在将来的某一天，突然让你看到坚持的意义。",
        "既然选择了远方，便只顾风雨兼程。",
        "熬过最苦的日子，做最酷的自己。"
    ];
    document.getElementById('quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
</script>
</body>
</html>
